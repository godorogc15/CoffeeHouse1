<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">CoffeeHouse</div>

  <div class="links">
    <a href="index.html">Home</a>
    <a href="menu.html">Meniu</a>
    <a href="order.html">Comandă</a>
    <a href="contact.html">Contact</a>

    <a href="login.html" id="loginLink">Logare</a>
    <a href="signup.html" id="signupLink">Înregistrare</a>

    <button onclick="logout()" id="logoutBtn" class="btn" style="display:none">
      Logout
    </button>
  </div>
</nav>

<div class="hero"></div>
<div class="container">

<h2>Comandă</h2>

<input placeholder="Nume">
<input placeholder="Prenume">

<select id="delivery" onchange="delivery()">
<option>Ridicare</option>
<option>Livrare</option>
</select>

<div id="addr" style="display:none;">
<input placeholder="Adresă">
</div>

<select id="paymentMethod" onchange="toggleCardSection()">
    <option value="">Alege metoda de plată</option>
    <option value="cash">Cash</option>
    <option value="card">Card</option>
</select>

<div id="cardSection" class="card-section">
    <input type="text" id="cardNumber" placeholder="Număr card">
    <input type="text" id="cardName" placeholder="Nume titular">
    <input type="text" id="cardExpiry" placeholder="MM/YY">
    <input type="text" id="cardCVV" placeholder="CVV">
</div>

<select>
<option value="">Băutură fierbinți</option>
<option>Espresso - 25 lei</option>
<option>Americano - 28 lei</option>
<option>Cappuccino - 35 lei</option>
<option>Latte - 40 lei</option>
<option>Macchiato - 30 lei</option>
</optgroup>
</select>

<select>
<option value="">Băuturi reci</option>
<option>Iced Coffee - 35 lei</option>
<option>Iced Latte - 40 lei</option>
<option>Cold Brew - 42 lei</option>
<option>Frappe - 45 lei</option>
</optgroup>
</select>

<select>
<option value="">Băuturi speciale</option>
<option>Ciocolată caldă - 30 lei</option>
<option>Mocha - 42 lei</option>
<option>Latte cu caramel - 43 lei</option>
<option>Latte cu vanilie - 43 lei</option>
</optgroup>
</select>

<select>
<option value="">Deserturi</option>
<option>Cheesecake - 45 lei</option>
<option>Brownie - 30 lei</option>
<option>Tiramisu - 50 lei</option>
<option>Croissant - 20 lei</option>
</optgroup>
</select>

<select>
<option value="">Gustări</option>
<option>Sandwich - 25 lei</option>
<option>Toast - 20 lei</option>
<option>Wrap - 30 lei</option>
</optgroup>

</select>

<button onclick ="send()" class="btn">Trimite</button>

</div>

<footer>© 2026 CoffeeHouse Strada Ștefan cel Mare și Sfânt 128, Chișinău</footer>

<script src="../js/script.js"></script>

</body>
</html>
